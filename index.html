                  { q: "What if my business is still early?", a: "That can be fine — as long as the expertise is real. You do not need a massive audience. You do need real ability, real conviction, and a willingness to simplify." },
                  { q: "Do I need an existing audience?", a: "No. An audience can help, but the real issue is usually not audience size — it is whether what you sell is sharp enough to convert attention into revenue." },
                  { q: "Is this done-for-you?", a: "This is not a passive service where you disappear and hope magic happens. It is a focused strategic installation process. We help shape the commercial layer beneath your business and build the assets and direction needed to move with far more clarity." }
                ].map((faq, i) => (
                  <div key={i} className="glass-card p-8 border-l-2 border-transparent hover:border-[#D6C3A3]/40 transition-all cursor-pointer">
                    <h4 className="text-lg font-semibold mb-3 text-[#FAF7F2]">{faq.q}</h4>
                    <p className="text-[#FAF7F2]/60 font-light text-sm">{faq.a}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* EMOTIONAL CONVERSION & FINAL CTA */}
          <section className="py-32 px-6 relative overflow-hidden">
            <div className="absolute inset-0 bg-gradient-to-b from-transparent via-[#D6C3A3]/5 to-transparent"></div>
            
            <div className="max-w-4xl mx-auto text-center relative z-10">
              <h2 className="text-4xl md:text-6xl font-bold tracking-tight mb-6">
                Stop being impressive in fragments.<br/>
                <span className="text-[#C47A2C]">Start being buyable with force.</span>
              </h2>
              
              <p className="text-xl text-[#FAF7F2]/70 font-light max-w-2xl mx-auto mb-12">
                The market cannot pay properly for what it cannot clearly perceive. If your value is still spread across too many ideas, services, audiences, and explanations, you need a sharper commercial shape.
              </p>
              
              <div className="flex flex-col sm:flex-row items-center justify-center gap-8 mb-16 text-[#D6C3A3] font-mono uppercase tracking-[0.2em] text-sm">
                <span>One offer.</span>
                <span className="hidden sm:inline">•</span>
                <span>One position.</span>
                <span className="hidden sm:inline">•</span>
                <span>One clear path.</span>
              </div>
              
              <button className="copper-button px-10 py-5 rounded-full text-[#FAF7F2] text-lg font-semibold tracking-wide inline-flex items-center justify-center space-x-3 w-full sm:w-auto">
                <span>Find Your Sharper Wedge</span>
                <ArrowRight className="w-5 h-5" />
              </button>
              <p className="mt-6 text-xs text-[#FAF7F2]/40 uppercase tracking-widest">Limited-fit offer. Serious operators only.</p>
            </div>
          </section>

          {/* FOOTER */}
          <footer className="py-12 border-t border-[#D6C3A3]/10 text-center px-6 relative z-10">
            <div className="max-w-4xl mx-auto">
              <span className="display-font font-bold text-2xl tracking-[0.15em] text-[#FAF7F2] mb-4 block">BRANDWELL</span>
              <p className="text-[#D6C3A3] uppercase tracking-widest text-xs font-semibold mb-8">Monetization architecture for experts</p>
              <p className="text-[#FAF7F2]/40 text-xs font-light max-w-md mx-auto">
                For experts, consultants, operators, and founders who want their business to carry the true weight of their value.
              </p>
              <div className="mt-12 text-[#FAF7F2]/20 text-xs">
                © {new Date().getFullYear()} Brandwell. All rights reserved.
              </div>
            </div>
          </footer>

          {/* VIDEO MODAL */}
          {isVideoOpen && (
            <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex items-center justify-center p-4">
              <div className="absolute top-6 right-6">
                <button onClick={() => setIsVideoOpen(false)} className="text-[#FAF7F2]/50 hover:text-[#FAF7F2] transition-colors">
                  <X className="w-8 h-8" />
                </button>
              </div>
              <div className="w-full max-w-5xl aspect-video bg-black border border-[#C47A2C]/30 rounded-3xl shadow-2xl flex items-center justify-center relative overflow-hidden">
                 {/* Replace with actual video iframe */}
                 <div className="absolute inset-0 bg-[#D6C3A3]/5 animate-pulse"></div>
                 <div className="text-center z-10">
                   <Play className="w-16 h-16 text-[#C47A2C] mx-auto mb-4 opacity-50" />
                   <p className="text-[#FAF7F2]/50 font-mono text-sm tracking-widest">VIDEO PLAYER PLACEHOLDER</p>
                 </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- RENDER APP ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
